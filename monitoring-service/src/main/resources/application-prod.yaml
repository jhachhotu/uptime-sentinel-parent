server:
  port: ${PORT:8081}

spring:
  application:
    name: monitoring-service

  # Disable Config Server & Eureka for cloud deployment
  config:
    import: ""
  cloud:
    config:
      enabled: false

  # --- EMAIL ---
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${SMTP_USERNAME}
    password: ${SMTP_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  # --- DATABASE (Supabase PostgreSQL) ---
  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

# --- SECURITY (Custom JWT) ---
jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION_MS:86400000} # 24 hours
google:
  client-id: ${GOOGLE_CLIENT_ID}

# Disable Eureka for cloud
eureka:
  client:
    enabled: false

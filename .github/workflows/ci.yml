name: Sentinel CI/CD

on:
  push:
    branches: [ main ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        service:
          - registry
          - config
          - monitoring
          - gateway

    steps:
      - uses: actions/checkout@v4

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Image
        run: |
          docker build -f Dockerfile.${{ matrix.service }} \
          -t ${{ secrets.DOCKER_USERNAME }}/sentinel-${{ matrix.service }}:latest .
          docker push ${{ secrets.DOCKER_USERNAME }}/sentinel-${{ matrix.service }}:latest